ui_requirements:
  source_registry:
    markdown: docs/reference/ui/zorn_lattice_ui_reference_registry.md
    json: docs/reference/ui/zorn_lattice_ui_reference_registry.json
    resource_registry: docs/reference/ui/zorn_lattice_ui_resource_registry.md
    projection_proto: proto/zorn/ui/v1/ui.proto
  milestones:
    ui_0_contract:
      status: defined
      goal: Preserve the UI evidence corpus and define the Zorn-owned COP projection contract.
      acceptance:
        - Reference registries are committed under docs/reference/ui.
        - Zorn UI projection proto exists under proto/zorn.
        - UI requirements are testable without copying upstream UI code.
    ui_1_projection_api:
      status: planned
      goal: Expose a UI-facing COP projection over Zorn's entity, task, object, and stream stores.
      acceptance:
        - COP state endpoint returns entity summaries, selected entity details, tasks, overlays, and status timing.
        - Event endpoint emits create/update/delete/task/object events with monotonically ordered timestamps.
        - Projection state is derived from Zorn state, not a separate source of truth.
    ui_2_dev_cop_shell:
      status: planned
      goal: Build the first usable map-first developer COP shell.
      acceptance:
        - Map, entity explorer, entity detail panel, task panel, and live status bar render with fixture data.
        - AIS REST/gRPC and entity visualizer fixture output is visible in the UI.
        - Playwright captures prove map markers, side panels, and live event status are browser-visible.
    ui_3_task_object_panels:
      status: planned
      goal: Add task lifecycle controls and object/media inspection.
      acceptance:
        - Task catalog actions are derived from selected entity data.
        - Task draft, execute, cancel, complete, and status update flows are visible.
        - Object thumbnails and media references remain linked to entities after refresh.
    ui_4_plugin_surface:
      status: planned
      goal: Allow scenario, adapter, and agent plugins to add panels and overlays.
      acceptance:
        - Plugins declare panel id, data dependencies, and optional map overlays.
        - Plugin UI failures are isolated from the core COP shell.
        - Scenario certification can request plugin panels for BA/ADS demos.
  priorities:
    P0:
      description: Build first for a credible Lattice-like developer COP.
      requirements:
        - id: REQ-COP-001
          title: Map-first Live COP shell
          acceptance: Render a dark, map-first shell with live status, map controls, entity layers, and selected-object panels.
        - id: REQ-EXPLORER-001
          title: Entity Explorer
          acceptance: Browse, select, search, sort, and inspect entities generated by certification fixtures.
        - id: REQ-EXPLORER-002
          title: Copy entity ID
          acceptance: Copy a stable entity ID from the explorer or detail panel for SDK/API debugging.
        - id: REQ-ENT-DETAIL-001
          title: Entity detail panel
          acceptance: Show status, template, disposition, identity, simulation/live state, kinematics, location, provenance, and health when present.
        - id: REQ-ENT-ACTIONS-001
          title: Entity action menu
          acceptance: Provide follow, manual/control placeholder, anchor-to-map-center, copy-content, and manage-asset actions.
        - id: REQ-MAP-CURSOR-001
          title: Cursor coordinates and scale
          acceptance: Show map scale and cursor coordinate readout.
        - id: REQ-STATUSBAR-001
          title: Live status bar
          acceptance: Show live state, UTC/current time, last event timing, and reconnect status.
        - id: REQ-TASK-CATALOG-001
          title: Task catalog-derived task menu
          acceptance: Derive task actions from selected asset TaskCatalog data where available, with fixture fallbacks.
        - id: REQ-TASK-LAUNCHER-001
          title: Task launcher dropdown
          acceptance: Launch task drafts from the selected asset detail panel.
        - id: REQ-TASK-DETAILS-001
          title: Task details panel
          acceptance: Show task type, assigned assets, objective/target, parameters, conflict state, and execute/discard controls.
        - id: REQ-TASK-CREATE-001
          title: Create task from map selection
          acceptance: Create a task from an asset plus a map-selected target or point.
        - id: REQ-TASK-EXECUTE-001
          title: Execute/discard task workflow
          acceptance: Support draft, execute, discard, status update, complete, and cancel workflows.
        - id: REQ-TASK-GEOMETRY-001
          title: Task geometry overlays
          acceptance: Render bearing/range lines and task geometry between assets and objectives.
        - id: REQ-THREAT-001
          title: Threat/disposition visualization
          acceptance: Visualize disposition and threat state with distinct marker styles and detail labels.
    P1:
      description: Add after P0 is fixture-driven and browser-tested.
      requirements:
        - REQ-TOOLBAR-001
        - REQ-ENT-SECTIONS-001
        - REQ-ENT-COPY-001
        - REQ-ENT-HOVER-001
        - REQ-MAP-CLUSTER-001
        - REQ-TASK-CONFLICT-001
        - REQ-TASK-CARDS-001
        - REQ-ZONE-001
        - REQ-PAYLOAD-001
        - REQ-OVERRIDE-001
        - REQ-OBJECT-LIST-001
        - REQ-MEDIA-001
        - REQ-SELECT-001
        - REQ-SELECT-002
        - REQ-BULK-001
        - REQ-GROUP-001
        - REQ-GROUP-UNGROUP-001
        - REQ-STAR-001
        - REQ-FEEDBACK-001
    P2:
      description: Specialized tactical workflows after core COP/task/object panels work.
      requirements:
        - REQ-SENSOR-COVERAGE-001
        - REQ-CUAS-QUEUE-001
        - REQ-SAFETY-STOP-001
        - REQ-REMOTEID-001
  proof_paths:
    fixture_driven:
      - anduril-sample-ais-rest
      - anduril-sample-ais-grpc
      - anduril-sample-entity-visualizer
      - anduril-sample-thumbnail
      - anduril-sample-auto-reconnaissance
    scenario_driven:
      - BA-001
      - BA-007
      - ADS-002
      - ADS-003
      - ADS-004
    browser_proof:
      required: true
      tool: playwright
      checks:
        - map markers are visible
        - entity selection opens a detail panel
        - task catalog actions render for taskable assets
        - live status updates after stream events
        - object media links survive refresh
